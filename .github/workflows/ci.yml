name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: gestion_formateurs
          MYSQL_USER: app
          MYSQL_PASSWORD: app
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          extensions: mbstring, pdo_mysql, intl

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: composer install --working-dir=backend --no-interaction --prefer-dist

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install Playwright browsers
        run: npm --prefix frontend exec -- playwright install --with-deps chromium

      - name: Prepare environment files
        run: |
          cp frontend/.env.example frontend/.env
          cp backend/.env.example backend/.env
          {
            echo "VITE_API_PROXY_TARGET=http://127.0.0.1:8000"
            echo "VITE_APP_ENV=test"
          } >> frontend/.env
          {
            echo "DB_HOST=127.0.0.1"
            echo "DB_PORT=3306"
            echo "DB_NAME=gestion_formateurs"
            echo "DB_USER=app"
            echo "DB_PASSWORD=app"
            echo "APP_FRONTEND_URL=http://127.0.0.1:5173"
            echo "APP_ENV=test"
            echo "APP_DEBUG=false"
          } >> backend/.env

      - name: Seed database
        run: |
          mysql -h127.0.0.1 -P3306 -uapp -papp gestion_formateurs < database/final_database.sql
          mysql -h127.0.0.1 -P3306 -uapp -papp gestion_formateurs < database/seed_data.sql
          php backend/init_db.php

      - name: Run test suite
        run: ./run-tests.sh
