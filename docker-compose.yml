services:
  db:
    image: mysql:8.4
    container_name: gestion-formateurs-db
    environment:
      MYSQL_DATABASE: gestion_formateurs
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/final_database.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro,Z
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
    container_name: gestion-formateurs-backend
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: gestion_formateurs
      DB_USER: app
      DB_PASSWORD: app
      APP_FRONTEND_URL: http://localhost:5173
      APP_DEBUG: "false"
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USERNAME: ""
      SMTP_PASSWORD: ""
      SMTP_FROM_EMAIL: ""
      SMTP_FROM_NAME: Gestion des horaires
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8001:80"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: gestion-formateurs-frontend
    working_dir: /app
    environment:
      VITE_API_PROXY_TARGET: http://backend
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app:Z
      - /app/node_modules
    ports:
      - "5173:5173"

volumes:
  db_data:
